<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Requisitos | MaxiPrest Panamá</title>
  <meta name="description" content="Cinco requisitos simples para solicitar tu préstamo personal en MaxiPrest. Sin papeleo excesivo." />
  <link rel="icon" href="/public/logo-mark.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link href="/shared/theme.css?v=7" rel="stylesheet" />
  <style>
    .page-hero {
      padding: calc(var(--mp-nav-h) + 80px) 24px 80px;
      text-align: center;
      position: relative;
    }
    .page-hero h1 { font-family: var(--mp-font-display); font-weight: 400; font-size: clamp(48px, 8vw, 120px); line-height: 0.98; letter-spacing: -0.025em; margin: 24px auto 24px; max-width: 1100px; }
    .page-hero h1 em { color: var(--mp-gold-deep); font-style: italic; }
    .page-hero p { color: var(--mp-ink-mute); font-size: 18px; max-width: 560px; margin: 0 auto; }

    /* Big requirements list */
    .req-list { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
    .req {
      display: grid;
      grid-template-columns: 120px 1fr 1fr;
      gap: 48px;
      padding: 64px 0;
      border-top: 1px solid var(--mp-line);
      align-items: start;
      position: relative;
    }
    .req:last-child { border-bottom: 1px solid var(--mp-line); }
    .req-check {
      cursor: pointer;
      user-select: none;
    }
    .req-check input { position: absolute; opacity: 0; pointer-events: none; }
    .req-num {
      font-family: var(--mp-font-display);
      font-weight: 300;
      font-size: 72px;
      color: var(--mp-ink-soft);
      line-height: 1;
      letter-spacing: -0.02em;
      transition: color .35s var(--mp-ease);
    }
    .req-check input:checked ~ .req-num { color: var(--mp-gold-deep); }
    .req-check input:checked ~ .req-check-mark {
      background: var(--mp-success);
      border-color: var(--mp-success);
    }
    .req-check input:checked ~ .req-check-mark::after {
      content: '';
      display: block;
      width: 8px; height: 14px;
      border: solid white;
      border-width: 0 2.5px 2.5px 0;
      transform: rotate(45deg);
      margin-top: -2px;
    }
    .req-check-mark {
      position: absolute;
      top: 12px; right: -8px;
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 1.5px solid var(--mp-line-strong);
      display: flex; align-items: center; justify-content: center;
      background: var(--mp-bg);
      transition: all .3s var(--mp-ease);
    }
    .req-body h2 {
      font-family: var(--mp-font-display);
      font-weight: 400;
      font-size: clamp(32px, 4vw, 52px);
      letter-spacing: -0.02em;
      margin: 0 0 24px;
      line-height: 1.05;
    }
    .req-body p { color: var(--mp-ink-mute); font-size: 16px; line-height: 1.7; max-width: 480px; margin: 0; }
    .req-visual {
      background: var(--mp-bg-soft);
      border-radius: var(--mp-radius-lg);
      padding: 32px;
      border: 1px solid var(--mp-line);
      display: flex;
      align-items: center;
      justify-content: center;
      aspect-ratio: 4/3;
      position: relative;
      overflow: hidden;
    }
    .req-visual::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 30%, var(--mp-gold-tint), transparent 60%);
      opacity: .6;
    }
    .req-visual > * { position: relative; z-index: 1; }
    .req-visual svg { width: 60%; height: auto; color: var(--mp-ink-2); }

    @media (max-width: 900px) {
      .req { grid-template-columns: 1fr; gap: 24px; padding: 48px 0; }
      .req-check { display: flex; align-items: center; gap: 16px; }
      .req-check-mark { position: static; }
      .req-visual { aspect-ratio: 16/9; }
    }

    /* Progress reveal */
    .req-progress {
      position: sticky;
      top: 96px;
      background: var(--mp-bg);
      z-index: 5;
      padding: 16px 24px;
      border: 1px solid var(--mp-line);
      border-radius: var(--mp-radius-pill);
      display: flex;
      align-items: center;
      gap: 16px;
      max-width: 360px;
      margin: 0 auto -20px;
      box-shadow: var(--mp-shadow-sm);
    }
    .req-progress-bar {
      flex: 1;
      height: 4px;
      background: var(--mp-line);
      border-radius: 4px;
      overflow: hidden;
    }
    .req-progress-bar > div { height: 100%; background: linear-gradient(90deg, var(--mp-gold), var(--mp-gold-deep)); width: 0%; transition: width .5s var(--mp-ease); }
    .req-progress-count { font-family: var(--mp-font-mono); font-size: 13px; font-weight: 600; color: var(--mp-ink); }

    .ready-banner {
      background: var(--mp-ink);
      color: var(--mp-bg);
      padding: 48px;
      border-radius: var(--mp-radius-lg);
      margin: 64px auto 0;
      max-width: 880px;
      text-align: center;
      opacity: 0;
      transform: translateY(20px);
      transition: all .6s var(--mp-ease);
      pointer-events: none;
    }
    .ready-banner.is-ready { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .ready-banner h3 { font-family: var(--mp-font-display); font-size: clamp(28px, 4vw, 44px); margin: 0 0 12px; font-weight: 400; line-height: 1.1; }
    .ready-banner h3 em { color: var(--mp-gold); font-style: italic; }
    .ready-banner p { color: rgba(255,255,255,0.7); margin: 0 0 28px; }
  </style>
</head>
<body>

  <div id="mp-nav"></div>

  <section class="page-hero">
    <div class="mp-hero-grid-bg"></div>
    <span class="mp-eyebrow" data-mp-reveal>Lo que necesitas</span>
    <h1 data-mp-reveal data-mp-reveal-delay="100">
      Cinco requisitos.<br/>Eso es <em>todo</em>.
    </h1>
    <p data-mp-reveal data-mp-reveal-delay="200">
      Sin papeleo excesivo, sin tramitología innecesaria. Marca los que ya tienes para ver tu progreso.
    </p>
  </section>

  <div class="req-progress" data-mp-reveal>
    <div class="req-progress-bar"><div id="reqBar"></div></div>
    <div class="req-progress-count"><span id="reqCount">0</span> / 5</div>
  </div>

  <section class="req-list">
    <label class="req req-check" data-mp-reveal>
      <input type="checkbox" class="req-cb" />
      <div class="req-num">01</div>
      <div class="req-check-mark"></div>
      <div class="req-body">
        <h2>Carta de trabajo</h2>
        <p>Documento original de tu empleador que certifique tu posición, salario y antigüedad. Vigencia menor a 30 días.</p>
      </div>
      <div class="req-visual">
        <svg viewBox="0 0 200 150" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="20" y="20" width="160" height="110" rx="6" fill="white"/>
          <line x1="40" y1="48" x2="120" y2="48"/>
          <line x1="40" y1="62" x2="160" y2="62"/>
          <line x1="40" y1="76" x2="140" y2="76"/>
          <line x1="40" y1="90" x2="100" y2="90"/>
          <rect x="120" y="100" width="40" height="20" rx="2" fill="#C9A961" stroke="none"/>
        </svg>
      </div>
    </label>

    <label class="req req-check" data-mp-reveal>
      <input type="checkbox" class="req-cb" />
      <div class="req-num">02</div>
      <div class="req-check-mark"></div>
      <div class="req-body">
        <h2>Ficha talonaria</h2>
        <p>Tus últimas tres fichas de pago para verificar tu salario neto y deducciones. Sirven impresas o en PDF.</p>
      </div>
      <div class="req-visual">
        <svg viewBox="0 0 200 150" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="30" y="30" width="120" height="80" rx="4" fill="white"/>
          <rect x="40" y="40" width="60" height="6" fill="#0A0A0A" stroke="none"/>
          <line x1="40" y1="58" x2="140" y2="58"/>
          <line x1="40" y1="70" x2="130" y2="70"/>
          <line x1="40" y1="82" x2="120" y2="82"/>
          <text x="100" y="100" font-family="JetBrains Mono" font-size="14" font-weight="600" fill="#C9A961" stroke="none" text-anchor="end">B/. 1,250</text>
          <rect x="155" y="50" width="35" height="50" rx="3" fill="#FAF8F3" stroke="#C9A961"/>
        </svg>
      </div>
    </label>

    <label class="req req-check" data-mp-reveal>
      <input type="checkbox" class="req-cb" />
      <div class="req-num">03</div>
      <div class="req-check-mark"></div>
      <div class="req-body">
        <h2>Cédula vigente</h2>
        <p>Cédula de identidad personal panameña en buen estado y dentro de su periodo de vigencia.</p>
      </div>
      <div class="req-visual">
        <svg viewBox="0 0 200 150" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="30" y="30" width="140" height="90" rx="8" fill="white"/>
          <rect x="40" y="42" width="50" height="60" rx="4" fill="#EBDDB9" stroke="#C9A961"/>
          <circle cx="65" cy="62" r="10" fill="#C9A961" stroke="none"/>
          <path d="M50 90 Q65 76 80 90" fill="#C9A961" stroke="none"/>
          <line x1="100" y1="50" x2="160" y2="50"/>
          <line x1="100" y1="62" x2="155" y2="62"/>
          <line x1="100" y1="74" x2="150" y2="74"/>
          <text x="100" y="100" font-family="JetBrains Mono" font-size="11" font-weight="600" fill="#0A0A0A" stroke="none">8-123-4567</text>
        </svg>
      </div>
    </label>

    <label class="req req-check" data-mp-reveal>
      <input type="checkbox" class="req-cb" />
      <div class="req-num">04</div>
      <div class="req-check-mark"></div>
      <div class="req-body">
        <h2>Residente en Panamá</h2>
        <p>Ciudadano panameño o extranjero con residencia legal vigente. Aplicamos en todo el territorio nacional.</p>
      </div>
      <div class="req-visual">
        <svg viewBox="0 0 200 150" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M60 100 L100 40 L140 100 Z" fill="#C9A961" stroke="none" opacity=".15"/>
          <circle cx="100" cy="75" r="38" stroke="#C9A961" stroke-width="1.5" fill="none"/>
          <circle cx="100" cy="75" r="8" fill="#0A0A0A" stroke="none"/>
          <path d="M100 50 L100 100 M75 75 L125 75" stroke="#C9A961" stroke-width="1"/>
          <text x="100" y="135" font-family="JetBrains Mono" font-size="10" font-weight="600" fill="#0A0A0A" stroke="none" text-anchor="middle">PANAMÁ</text>
        </svg>
      </div>
    </label>

    <label class="req req-check" data-mp-reveal>
      <input type="checkbox" class="req-cb" />
      <div class="req-num">05</div>
      <div class="req-check-mark"></div>
      <div class="req-body">
        <h2>Salario mínimo B/. 600 + edad 20+</h2>
        <p>Ingreso mensual comprobable desde B/. 600 y mayor de 20 años. Aplicamos para asalariados, gobierno, independientes y jubilados.</p>
      </div>
      <div class="req-visual">
        <svg viewBox="0 0 200 150" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M30 110 L60 80 L90 95 L120 60 L160 75" stroke="#C9A961" stroke-width="2" fill="none"/>
          <circle cx="60" cy="80" r="4" fill="#C9A961" stroke="none"/>
          <circle cx="90" cy="95" r="4" fill="#C9A961" stroke="none"/>
          <circle cx="120" cy="60" r="4" fill="#C9A961" stroke="none"/>
          <circle cx="160" cy="75" r="4" fill="#C9A961" stroke="none"/>
          <text x="100" y="130" font-family="JetBrains Mono" font-size="13" font-weight="600" fill="#0A0A0A" stroke="none" text-anchor="middle">B/. 600 / mes</text>
        </svg>
      </div>
    </label>
  </section>

  <div style="padding: 0 24px;">
    <div class="ready-banner" id="readyBanner">
      <h3>Tienes todo lo necesario.<br/><em>Apliquemos ya</em>.</h3>
      <p>Tienes los cinco requisitos. Ahora solo falta llenar el formulario.</p>
      <a class="mp-btn mp-btn-gold-solid" href="/aplica" style="padding: 18px 36px;">
        Aplicar ahora
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      </a>
    </div>
  </div>

  <div style="height: 120px;"></div>

  <div id="mp-footer"></div>
  <script src="/shared/nav-footer.js?v=7"></script>
  <script>
    (function() {
      const checks = document.querySelectorAll('.req-cb');
      const bar = document.getElementById('reqBar');
      const count = document.getElementById('reqCount');
      const banner = document.getElementById('readyBanner');
      function update() {
        const checked = Array.from(checks).filter(c => c.checked).length;
        count.textContent = checked;
        bar.style.width = (checked / 5 * 100) + '%';
        if (checked === 5) banner.classList.add('is-ready');
        else banner.classList.remove('is-ready');
      }
      checks.forEach(c => c.addEventListener('change', update));
    })();
  </script>
</body>
</html>
